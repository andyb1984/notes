<!DOCTYPE html>
<html>
<head>
  <title>Editable Notes</title>
</head>
<body>
  <h1>My Notes</h1>
  <textarea id="note" rows="15" cols="60"></textarea><br><br>
  <button onclick="saveNote()">Save</button>
  <p id="status"></p>

  <script>
  async function loadNote() {
  try {
    const response = await fetch("https://api.github.com/repos/andyb1984/notes/contents/notes.txt", {
      headers: {
        Accept: "application/vnd.github.v3.raw"
      }
    });
    if (response.ok) {
      const text = await response.text();
      document.getElementById("note").value = text;
    } else {
      document.getElementById("note").value = ""; // empty if file not found
    }
  } catch (err) {
    console.error("Error loading note:", err);
  }
}

// Call on page load
window.onload = loadNote;
    
    
async function saveNote() {
  const content = document.getElementById("note").value;
  const status = document.getElementById("status");
  status.innerText = "Saving...";

  try {
    const response = await fetch("https://andyb1984-notes.vercel.app/api/save", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ content })
    });

    if (response.ok) {
      status.innerText = "Saved successfully!";
      // Small Delay, then reload the note to ensure we have the fresh version
      setTimeout(loadNote, 1500); 
    } else {
      const errText = await response.text();
      status.innerText = "Error: " + errText;
    }
  } catch (err) {
    status.innerText = "Error: " + err.message;
  }
}
  </script>
</body>
</html>
