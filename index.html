<!DOCTYPE html>
<html>
<head>
  <title>Editable Notes</title>
</head>
<body>
  <h1>My Notes</h1>
  <textarea id="note" rows="15" cols="60"></textarea><br><br>
  <button onclick="saveNote()">Save</button>
  <p id="status"></p>

  <script>
  async function loadNote() {
  try {
    const response = await fetch("https://api.github.com/repos/andyb1984/notes/contents/notes.txt", {
      headers: {
        Accept: "application/vnd.github.v3.raw"
      }
    });
    if (response.ok) {
      const text = await response.text();
      document.getElementById("note").value = text;
    } else {
      document.getElementById("note").value = ""; // empty if file not found
    }
  } catch (err) {
    console.error("Error loading note:", err);
  }
}

// Call on page load
window.onload = loadNote;
    
    
    async function saveNote() {
      const content = document.getElementById("note").value;

      try {
        const response = await fetch("https://notes-gilt-chi.vercel.app/api/save", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ content })
        });

        const result = await response.text();
        document.getElementById("status").innerText = result;
      } catch (err) {
        document.getElementById("status").innerText = "Error: " + err.message;
      }
    }
  </script>
</body>
</html>
